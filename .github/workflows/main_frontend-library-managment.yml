name: Deploy Library Management to Azure VM

on:
  push:
    branches:
      - main  # Tự động chạy khi bạn push hoặc merge vào nhánh main
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công trên GitHub nếu muốn

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.75.55.206
          username: hieu2005
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Khớp chính xác với tên bạn đã đặt
          port: 22
          script: |
            # 1. Di chuyển vào thư mục dự án
            cd ~/projects/library-management
            
            # 2. Cập nhật code mới nhất từ GitHub
            git pull origin main
            
            # 3. Build và Restart Backend (Spring Boot)
            cd backend
            # Cấp quyền thực thi cho file mvnw nếu chưa có
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            # Restart service để nhận file JAR mới
            sudo systemctl restart library-backend
            
            # 4. Build Frontend (React/Vite)
            cd ../frontend
            # Cài đặt thư viện và build
            npm install
            npm run build
            
            # 5. Cấp lại quyền cho Nginx và làm mới service
            chmod 755 /home/hieu2005
            sudo systemctl restart nginx
            
            echo "Deploy thành công!"
