name: Deploy Library Management to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.75.55.206
          username: hieu2005
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Vào thư mục dự án và cập nhật code từ GitHub
            cd ~/projects/library-management
            git pull origin main
            
            # 2. Build và Restart Backend (Spring Boot)
            echo "--- Building Backend ---"
            cd backend
            chmod +x mvnw
            ./mvnw clean package -DskipTests
            # Restart service backend (đảm bảo file .service của bạn trỏ vào đúng file .jar trong target)
            sudo systemctl restart library-backend
            
            # 3. Build Frontend (React/Vite)
            echo "--- Building Frontend ---"
            cd ../frontend
            npm install
            npm run build
            
            # 4. Cấp quyền quan trọng để Nginx có thể đọc file
            # Nginx cần quyền 'x' ở thư mục người dùng để truy cập vào sâu bên trong
            chmod 755 /home/hieu2005
            # Cấp quyền đọc cho toàn bộ thư mục dự án và thư mục dist
            chmod -R 755 /home/hieu2005/projects/library-management/frontend/dist
            
            # 5. Làm mới Nginx để đảm bảo nhận diện các file tĩnh mới
            sudo systemctl reload nginx
            
            echo "--- Deploy thành công hoàn toàn! ---"
