<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản Lý Thư Viện</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">📚</span>
        <span class="logo-text">Thư Viện</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-section="dashboard">
          <span class="nav-icon">🏠</span>
          <span>Tổng quan</span>
        </a>
        <a href="#" class="nav-item" data-section="books">
          <span class="nav-icon">📖</span>
          <span>Sách</span>
        </a>
        <a href="#" class="nav-item" data-section="members">
          <span class="nav-icon">👥</span>
          <span>Thành viên</span>
        </a>
        <a href="#" class="nav-item" data-section="borrows">
          <span class="nav-icon">🔄</span>
          <span>Mượn trả</span>
        </a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <h1 class="topbar-title" id="page-title">Tổng quan</h1>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>

      <div class="content" id="content">
        <!-- Sections rendered by JS -->
      </div>
    </main>
  </div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modal-title">Modal</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
